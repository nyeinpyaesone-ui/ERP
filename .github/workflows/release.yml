name: Release

on:
  push:
    tags:
      - 'v*'

env:
  DOCKER_USERNAME: powerrangeranikg
  DOCKER_IMAGE: nyeinpyaesone-ui/erp-solution

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${ secrets.GITHUB_TOKEN }
        with:
          tag_name: ${ github.ref }
          release_name: Release ${ github.ref }
          draft: false
          prerelease: false

  docker-push:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${ secrets.DOCKER_USERNAME }
          password: ${ secrets.DOCKER_PASSWORD }
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${ env.DOCKER_IMAGE }-backend:${ github.ref_name }
            ${ env.DOCKER_IMAGE }-backend:latest
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${ env.DOCKER_IMAGE }-frontend:${ github.ref_name }
            ${ env.DOCKER_IMAGE }-frontend:latest
