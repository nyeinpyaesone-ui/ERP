apiVersion: batch/v1
kind: CronJob
metadata:
  name: ai-erp-db-backup
  namespace: ai-erp
  labels:
    app.kubernetes.io/name: ai-erp-db-backup
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: ai-erp
spec:
  schedule: "0 2 * * *"
  timeZone: "Asia/Yangon"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: ai-erp-db-backup
        spec:
          restartPolicy: OnFailure
          containers:
          - name: backup
            image: postgres:15-alpine
            command:
            - /bin/sh
            - -c
            - |
              export PGPASSWORD=$(DB_PASSWORD)
              pg_dump -h ai-erp-postgres -U $(DB_USER) -d $(DB_NAME) --clean --if-exists --verbose | gzip > /backup/ai-erp-$(date +%Y%m%d-%H%M%S).sql.gz
              aws s3 cp /backup/ s3://$(S3_BUCKET)/backups/database/ --recursive --storage-class STANDARD_IA
              find /backup -name "*.sql.gz" -mtime +30 -delete
            env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: ai-erp-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ai-erp-secrets
                  key: DB_PASSWORD
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: ai-erp-config
                  key: DB_NAME
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: ai-erp-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-erp-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: S3_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: ai-erp-config
                  key: S3_BUCKET
            volumeMounts:
            - name: backup
              mountPath: /backup
          volumes:
          - name: backup
            emptyDir:
              sizeLimit: 10Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ai-erp-redis-backup
  namespace: ai-erp
  labels:
    app.kubernetes.io/name: ai-erp-redis-backup
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: ai-erp
spec:
  schedule: "0 3 * * *"
  timeZone: "Asia/Yangon"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: ai-erp-redis-backup
        spec:
          restartPolicy: OnFailure
          containers:
          - name: backup
            image: redis:7-alpine
            command:
            - /bin/sh
            - -c
            - |
              redis-cli -h ai-erp-redis -a $(REDIS_PASSWORD) --rdb /backup/ai-erp-redis-$(date +%Y%m%d-%H%M%S).rdb
              aws s3 cp /backup/ s3://$(S3_BUCKET)/backups/redis/ --recursive --storage-class STANDARD_IA
              find /backup -name "*.rdb" -mtime +30 -delete
            env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ai-erp-secrets
                  key: REDIS_PASSWORD
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: ai-erp-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-erp-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: S3_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: ai-erp-config
                  key: S3_BUCKET
            volumeMounts:
            - name: backup
              mountPath: /backup
          volumes:
          - name: backup
            emptyDir:
              sizeLimit: 5Gi

