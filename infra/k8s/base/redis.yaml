apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ai-erp-redis
  namespace: ai-erp
  labels:
    app.kubernetes.io/name: ai-erp-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: ai-erp
spec:
  serviceName: ai-erp-redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-erp-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-erp-redis
        app.kubernetes.io/component: cache
        app.kubernetes.io/part-of: ai-erp
    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - name: redis
          containerPort: 6379
          protocol: TCP
        command:
        - redis-server
        - /etc/redis/redis.conf
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ai-erp-secrets
              key: REDIS_PASSWORD
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: data
          mountPath: /data
        - name: config
          mountPath: /etc/redis
      volumes:
      - name: config
        configMap:
          name: ai-erp-redis-config
  volumeClaimTemplates:
  - metadata:
      name: data
      labels:
        app.kubernetes.io/name: ai-erp-redis
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: fast-ssd
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ai-erp-redis
  namespace: ai-erp
  labels:
    app.kubernetes.io/name: ai-erp-redis
    app.kubernetes.io/component: cache
spec:
  type: ClusterIP
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
    protocol: TCP
  selector:
    app.kubernetes.io/name: ai-erp-redis
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-erp-redis-config
  namespace: ai-erp
data:
  redis.conf: |
    bind 0.0.0.0
    port 6379
    requirepass $(REDIS_PASSWORD)
    maxmemory 768mb
    maxmemory-policy allkeys-lru
    appendonly yes
    appendfsync everysec
    save 900 1
    save 300 10
    save 60 10000
    dir /data
    loglevel notice
    protected-mode yes
    tcp-keepalive 300
    timeout 0
    databases 16

